name: CI

on:
  pull_request:
    branches-ignore:
      - 'master'

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip==24.3.1 setuptools==78.1.1
          pip install -e ".[dev]"

      - name: Run Ruff check
        run: ruff check src/ tests/

      - name: Run Ruff format check
        run: ruff format --check src/ tests/

  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip==24.3.1 setuptools==78.1.1
          pip install -e ".[dev]"

      - name: Run Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/src/app
        run: pytest

      - name: Pytest Coverage Comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: Application Code Coverage
          badge-title: Coverage

  mypy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip==24.3.1 setuptools==78.1.1
          pip install -e ".[dev]"

      - name: Run mypy
        run: |
          mypy src/app/

  complexipy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip==24.3.1 setuptools==78.1.1
          pip install -e ".[dev]"

      - name: Check complexity
        run: |
          complexipy src/app --max-complexity 15
          complexipy tests --max-complexity 15

  helm_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint all Helm charts
        run: |
          helm lint ./charts

  helm_template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Template all Helm charts
        run: |
          helm template ./charts

  build-and-test-container:
    env:
      APP: evergreen-tvevents-test
    runs-on: ubuntu-latest
    needs: [ruff, pytest, mypy, complexipy, helm_lint, helm_template]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Image Tag
        id: extract-image-tag
        run: |
          IMAGE_TAG="${{ env.APP }}:${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker buildx build --platform linux/amd64 -t ${{ env.IMAGE_TAG }} . --pull --no-cache --load

      - name: Run container
        shell: bash
        run: |
          set -eux
          
          RANDOM_PORT=$((1000 + RANDOM % 8000))
          RANDOM_SUFFIX=$(head /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 8)
          echo "RANDOM_PORT=$RANDOM_PORT" >> $GITHUB_ENV
          echo "RANDOM_SUFFIX=$RANDOM_SUFFIX" >> $GITHUB_ENV
          
          docker run -d -p $RANDOM_PORT:8000 \
            -e AWS_REGION=us-east-1 \
            -e TEST_CONTAINER=true \
            -e LOG_LEVEL=DEBUG \
            -e ENV=dev \
            -e SERVICE_NAME="local-testing" \
            -e T1_SALT="ci-test-salt" \
            --name "${{ env.APP }}-container-$RANDOM_SUFFIX" \
            "${{ env.IMAGE_TAG }}"

      - name: Wait for the container to start
        run: sleep 3

      - name: Verify /status endpoint
        run: |
          set +e
          
          response=$(curl --silent --fail http://localhost:${{ env.RANDOM_PORT }}/status)
          curl_exit=$?
          
          if [[ $curl_exit -ne 0 || "$response" != "OK" ]]; then
            docker logs ${{ env.APP }}-container-${{ env.RANDOM_SUFFIX }}
            echo "Container /status endpoint did not return OK"
            exit 1
          fi

      - name: Stop and remove container
        run: |
          docker stop ${{ env.APP }}-container-${{ env.RANDOM_SUFFIX }}
          docker rm ${{ env.APP }}-container-${{ env.RANDOM_SUFFIX }}
