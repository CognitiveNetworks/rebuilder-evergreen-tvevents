name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e output/rebuilder-redis-module
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e output/rebuilder-redis-module
          pip install -e ".[dev]"
      - name: Type check
        run: mypy src/ --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e output/rebuilder-redis-module
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=tvevents --cov-report=term-missing --cov-report=xml -v
        env:
          T1_SALT: test-salt-for-ci
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  scan:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --platform linux/amd64 -t rebuilder-evergreen-tvevents:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rebuilder-evergreen-tvevents:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  deploy-dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, scan]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.ECR_REGISTRY }}/rebuilder-evergreen-tvevents:${{ github.sha }} .
          docker push ${{ secrets.ECR_REGISTRY }}/rebuilder-evergreen-tvevents:${{ github.sha }}
      - name: Deploy to dev
        run: |
          # Update EKS deployment with new image
          echo "Deploying ${{ github.sha }} to dev environment"

  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform init
          terraform plan -var-file=envs/dev.tfvars -no-color | tee plan.txt
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan.substring(0, 65000)}\n\`\`\``
            });
