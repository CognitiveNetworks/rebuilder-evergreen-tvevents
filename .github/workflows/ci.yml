name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Type check
        run: mypy src/tvevents/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ \
            -v \
            --tb=short \
            --cov=tvevents \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          ENV: test
          T1_SALT: ci-test-salt
          RDS_HOST: localhost
          RDS_DB: tvevents_test
          RDS_USER: postgres
          RDS_PASS: postgres
          RDS_PORT: "5432"
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_SECURITY_PROTOCOL: PLAINTEXT
          KAFKA_TOPIC_EVERGREEN: ci-evergreen
          KAFKA_TOPIC_LEGACY: ci-legacy
          SEND_EVERGREEN: "true"
          SEND_LEGACY: "true"
          TVEVENTS_DEBUG: "false"
          AWS_REGION: us-east-1
          BLACKLIST_CACHE_FILEPATH: /tmp/.ci_blacklist_cache

  docker:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          pip install pip-tools
          pip-compile --output-file=requirements.txt pyproject.toml
          docker build -t tvevents-k8s:ci .
