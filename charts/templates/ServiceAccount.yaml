{{/*
SERVICE ACCOUNT TEMPLATE

Generates Kubernetes ServiceAccount resources for pod identity.

Configuration: values.yaml -> serviceAccounts[name]

Features:
- AWS IAM role annotations (IRSA)
- Standard labels and annotations
*/}}
{{- range $saName, $sa := .Values.serviceAccounts }}
  {{- if $sa.enabled }}
    {{- $env := include "env.name" $ }}
    {{- $namespace := include "resource.namespace" $ }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}-{{ $env }}
  namespace: {{ $namespace }}
  annotations:
    {{- include "common.annotations" (dict "global" $) | nindent 4 }}
    {{- if $sa.annotations }}
    {{- toYaml $sa.annotations | nindent 4 }}
    {{- end }}
  labels:
    {{- include "common.labels" (dict "name" $saName "global" $) | nindent 4 }}
    {{- if $sa.labels }}
    {{- toYaml $sa.labels | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}

