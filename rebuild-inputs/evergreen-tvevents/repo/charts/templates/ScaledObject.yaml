
{{- $env := default "dev" .Values.environment }}
{{- if not (hasKey .Values.environmentConfig $env) }}
{{- fail (printf "environmentConfig does not contain a key for environment '%s'" $env) }}
{{- end }}
{{- if not .Values.localDev.enabled }}


apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tvevents.labels" . | nindent 4 }}
  annotations:
    {{- include "tvevents.annotations" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ .Values.name }}
  minReplicaCount: {{ (index .Values.environmentConfig $env).minReplicaCount }}
  maxReplicaCount: {{ (index .Values.environmentConfig $env).maxReplicaCount }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: {{ .Values.scaling.behavior.scaleUp.stabilizationWindowSeconds }}
          policies:
          {{- range .Values.scaling.behavior.scaleUp.policies }}
          - type: {{ .type }}
            value: {{ .value }}
            periodSeconds: {{ .periodSeconds }}
          {{- end }}
        scaleDown:
          stabilizationWindowSeconds: {{ .Values.scaling.behavior.scaleDown.stabilizationWindowSeconds }}
          policies:
          {{- range .Values.scaling.behavior.scaleDown.policies }}
          - type: {{ .type }}
            value: {{ .value }}
            periodSeconds: {{ .periodSeconds }}
          {{- end }}
  triggers:
  - type: cpu
    metricType: Utilization # Allowed types are 'Utilization' or 'AverageValue'
    metadata:
      value: "{{ .Values.cpuScalingThreshold }}"
{{- end }}
