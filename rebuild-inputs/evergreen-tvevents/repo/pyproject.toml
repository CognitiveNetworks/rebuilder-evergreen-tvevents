[project.optional-dependencies]
dev = [
    "validate-pyproject==0.18",
    "pytest-pythonpath==0.7.4",
    "pytest-cov==4.0.0",
    "complexipy==3.3.0",
    "pip-tools==7.4.1",
    "pytest==6.2.5",
    "pylint==3.2.5",
    "black==24.4.2",
    "toml==0.10.2",
    "pytest-env",
    "coverage[toml]==7.8.0",
    "typer[all]==0.15.4",
    "mypy",
    "types-jsonschema",
    "types-psycopg2",
    "pip==24.3.1",
    "setuptools==78.1.1"
]

[build-system]
requires = ["setuptools>=78"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"app" = "app"}
py-modules = ["app"]

[tool.setuptools.packages.find]
where = ["app"]
namespaces = false

[tool.black]
line-length = 88
target-version = ['py310']
skip-string-normalization = true

[tool.mypy]
ignore_missing_imports = true