    "google-cloud-core==0.28.1",
    "google-cloud-monitoring==0.28.1",
    "googleapis-common-protos==1.70.0",
    "gunicorn==23.0.0",
    "idna==3.10",
    "importlib-metadata>=3.6",
    "itsdangerous==2.2.0",
    "Jinja2==3.1.6",
    "jmespath==1.0.1",
    "jsonschema==3.2.0",
    "MarkupSafe==3.0.2",
    "packaging==24.2",
