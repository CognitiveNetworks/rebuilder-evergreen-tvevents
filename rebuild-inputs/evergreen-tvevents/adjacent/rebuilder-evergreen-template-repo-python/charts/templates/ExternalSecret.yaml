{{/*
EXTERNAL SECRET TEMPLATE

Generates External Secrets Operator resources for AWS Secrets Manager integration.

Configuration:
- Secret stores: values-mvp.yaml -> secretstores[name]
- Secrets: values-mvp.yaml -> secrets[name]

Features:
- Auto-discovers secret keys from deployment envFrom references
- Syncs secrets from AWS Secrets Manager to Kubernetes
- Supports both individual key sync and full secret sync
- Skipped in local_dev environments
*/}}
{{- $envType := include "env.type" . -}}
{{- if ne $envType "local_dev" }}
  {{- range $secretStoreName, $secretStore := .Values.secretstores }}
    {{- if $secretStore.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  {{- include "metadata.standard" (dict "name" $secretStoreName "config" $secretStore "global" $) | nindent 2 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $secretStore.region }}
    {{- end }}
  {{- end }}
  {{- range $secretName, $secret := .Values.secrets }}
    {{- if $secret.enabled }}
      {{- $secretKeys := list }}
      {{- range $deploymentName, $deployment := $.Values.deployments }}
        {{- if $deployment.envFrom }}
          {{- range $deployment.envFrom }}
            {{- if and .secretRef (eq .secretRef.name $secret.name) }}
              {{- $secretKeys = append $secretKeys .secretRef.key }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- range $jobName, $job := $.Values.jobs }}
        {{- if $job.envFrom }}
          {{- range $job.envFrom }}
            {{- if and .secretRef (eq .secretRef.name $secret.name) }}
              {{- $secretKeys = append $secretKeys .secretRef.key }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- range $componentName, $daprConfig := $.Values.daprComponents }}
        {{- if $daprConfig.enabled }}
          {{- range $component := $daprConfig.components }}
            {{- if $component.enabled }}
              {{- range $component.aws.metadata }}
                {{- if and .secretKeyRef (eq .secretKeyRef.name $secret.name) }}
                  {{- $secretKeys = append $secretKeys .secretKeyRef.key }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  {{- include "metadata.standard" (dict "name" $secretName "config" $secret "global" $) | nindent 2 }}
spec:
  secretStoreRef:
    name: {{ $secret.secretStore }}-{{ include "resource.suffix" $ }}
    kind: SecretStore
  target:
    name: {{ $secret.name }}
    creationPolicy: Owner
      {{- if and $secretKeys (not $secret.syncAll) }}
  data:
        {{- range $secretKeys | uniq }}
  - secretKey: {{ . }}
    remoteRef:
      key: {{ include "env.name" $ }}{{ $secret.path }}
      property: {{ . }}
        {{- end }}
      {{- else }}
  dataFrom:
  - extract:
      key: {{ include "env.name" $ }}{{ $secret.path }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

