suite: test externalsecret
templates:
  - ExternalSecret.yaml
tests:
  # DEV Environment - Local
  - it: dev local - should create SecretStore when enabled
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
      secrets: {}
    asserts:
      - isKind:
          of: SecretStore
        documentIndex: 0
      - equal:
          path: spec.provider.aws.service
          value: SecretsManager
        documentIndex: 0
      - equal:
          path: spec.provider.aws.region
          value: us-east-1
        documentIndex: 0

  # DEV Environment - Workload
  - it: dev workload - should create ExternalSecret for dev workload environment
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: true
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
      deployments: {}
    asserts:
      - isKind:
          of: ExternalSecret
        documentIndex: 1

  # QA Environment
  - it: qa - should create ExternalSecret for qa environment
    set:
      global:
        appName: demo-app
        labels:
          environment: qa
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: qa
        workload_env: true
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
      deployments: {}
    asserts:
      - isKind:
          of: ExternalSecret
        documentIndex: 1

  # STAGING Environment
  - it: staging - should create ExternalSecret for staging environment
    set:
      global:
        appName: demo-app
        labels:
          environment: staging
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: staging
        workload_env: true
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-west-2
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
      deployments: {}
    asserts:
      - isKind:
          of: ExternalSecret
        documentIndex: 1

  # PROD Environment
  - it: prod - should create ExternalSecret with correct path
    set:
      global:
        appName: demo-app
        labels:
          environment: prod
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: prod
        workload_env: true
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-west-2
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
      deployments: {}
    asserts:
      - isKind:
          of: ExternalSecret
        documentIndex: 1
      - equal:
          path: spec.provider.aws.region
          value: us-west-2
        documentIndex: 0

  # PR Environment
  - it: pr_env - should create ExternalSecret for PR environment
    set:
      global:
        appName: demo-app
        labels:
          environment: pr-123
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: pr-123
        pr_number: 123
        workload_env: false
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
      deployments: {}
    asserts:
      - isKind:
          of: ExternalSecret
        documentIndex: 1

  # Edge Cases
  - it: should create ExternalSecret with syncAll enabled
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
      deployments: {}
    asserts:
      - isKind:
          of: ExternalSecret
        documentIndex: 1
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore
        documentIndex: 1
      - equal:
          path: spec.target.name
          value: demo-app-secrets
        documentIndex: 1
      - isNotNull:
          path: spec.dataFrom
        documentIndex: 1

  - it: should create multiple ExternalSecrets
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
      secrets:
        demo-app:
          enabled: true
          secretStore: demo-app
          name: demo-app-secrets
          path: /demo-app/application-secrets
          syncAll: true
        otelcollector:
          enabled: true
          secretStore: demo-app
          name: otel-collector-secrets
          path: /inscape/o11y-config
          syncAll: true
      deployments: {}
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: SecretStore
        documentIndex: 0
      - isKind:
          of: ExternalSecret
        documentIndex: 1
      - isKind:
          of: ExternalSecret
        documentIndex: 2

  - it: should not create SecretStore when disabled
    set:
      global:
        appName: demo-app
      ciOptions:
        environment: dev
        workload_env: false
      secretstores:
        demo-app:
          enabled: false
      secrets:
        demo-app:
          enabled: false
        otelcollector:
          enabled: false
      deployments: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create ExternalSecret when disabled
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
      secretstores:
        demo-app:
          enabled: true
          provider: aws
          region: us-east-1
          annotations:
            test: value
      secrets:
        demo-app:
          enabled: false
        otelcollector:
          enabled: false
      deployments: {}
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: SecretStore
        documentIndex: 0
