      ciOptions:
        environment: qa
        workload_env: true
      httproutes:
        evergreen.cognet.tv:
          enabled: true
          targetDeployment: demo-app
          parentRefs:
            - name: evergreen.cognet.tv
              namespace: evergreen-gateway
          rules:
            - backendRefs:
