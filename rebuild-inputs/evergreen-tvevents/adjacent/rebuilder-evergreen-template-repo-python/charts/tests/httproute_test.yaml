suite: test httproute
templates:
  - HTTPRoute.yaml
tests:
  # DEV Environment - Local
  - it: dev local - should create HTTPRoute when enabled
    set:
      global:
        appName: demo-app
        hostPrefix: demo-app
        domain: evergreen.cognet.tv
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
      httproutes:
        evergreen.cognet.tv:
          enabled: true
          targetDeployment: demo-app
          parentRefs:
            - name: evergreen.cognet.tv
              namespace: evergreen-gateway
          rules:
            - backendRefs:
                - name: demo-app
                  port: 80
              matches:
                - path:
                    type: PathPrefix
                    value: /
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.parentRefs[0].name
          value: evergreen.cognet.tv
      - equal:
          path: spec.parentRefs[0].namespace
          value: evergreen-gateway

  # DEV Environment - Workload
  - it: dev workload - should create HTTPRoute for dev workload environment
    set:
      global:
        appName: demo-app
        hostPrefix: demo-app
        domain: evergreen.cognet.tv
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: true
      httproutes:
        evergreen.cognet.tv:
          enabled: true
          targetDeployment: demo-app
          parentRefs:
            - name: evergreen.cognet.tv
              namespace: evergreen-gateway
          rules:
            - backendRefs:
                - name: demo-app
                  port: 80
    asserts:
      - isKind:
          of: HTTPRoute

  # QA Environment
