suite: test serviceaccount
templates:
  - ServiceAccount.yaml
tests:
  # DEV Environment - Local
  - it: dev local - should create ServiceAccount when enabled
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
      serviceAccounts:
        demo-app-sa:
          enabled: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: demo-app-sa-dev

  # DEV Environment - Workload
  - it: dev workload - should create ServiceAccount for dev workload environment
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: true
      serviceAccounts:
        demo-app-sa:
          enabled: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: demo-app-sa-dev

  # QA Environment
  - it: qa - should create ServiceAccount with correct labels
    set:
      global:
        appName: demo-app
        labels:
          environment: qa
          team: test
          function: demo-app
        annotations:
          repo: test
      ciOptions:
        environment: qa
        workload_env: true
        cloud_region: us-east-1
      serviceAccounts:
        demo-app-sa:
          enabled: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.labels.environment
          value: qa
      - equal:
          path: metadata.labels.team
          value: test

  # STAGING Environment
  - it: staging - should create ServiceAccount for staging environment
    set:
      global:
        appName: demo-app
        labels:
          environment: staging
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: staging
        workload_env: true
        cloud_region: us-west-2
      serviceAccounts:
        demo-app-sa:
          enabled: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: demo-app-sa-staging
      - equal:
          path: metadata.labels.environment
          value: staging

  # PROD Environment
  - it: prod - should create ServiceAccount with IAM role annotation
    set:
      global:
        appName: demo-app
        labels:
          environment: prod
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: prod
        workload_env: true
        cloud_region: us-west-2
      serviceAccounts:
        demo-app-sa:
          enabled: true
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/demo-app-role
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/demo-app-role

  # PR Environment
  - it: pr_env - should create ServiceAccount for PR environment
    set:
      global:
        appName: demo-app
        labels:
          environment: pr-123
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: pr-123
        pr_number: 123
        workload_env: false
        cloud_region: us-east-1
      serviceAccounts:
        demo-app-sa:
          enabled: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: demo-app-sa-pr-123
      - equal:
          path: metadata.labels.environment
          value: pr-123

  # Edge Cases
  - it: should create multiple ServiceAccounts
    set:
      global:
        appName: demo-app
        labels:
          environment: dev
          team: test
        annotations:
          repo: test
      ciOptions:
        environment: dev
        workload_env: false
        cloud_region: us-east-1
      serviceAccounts:
        demo-app-sa:
          enabled: true
        worker-sa:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2

  - it: should not create ServiceAccount when disabled
    set:
      global:
        appName: demo-app
      ciOptions:
        environment: dev
        workload_env: false
      serviceAccounts:
        demo-app-sa:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
